# ==========================================
# 1. Global Core Settings (Must be at the top)
# ==========================================
base_url = "https://ncerone.com"
theme = "project-portfolio"
default_language = "en"
compile_sass = true
build_search_index = true

taxonomies = [
    { name = "projects", paginate_by = 5, feed = true },
    { name = "skills", paginate_by = 5, feed = true }
]

[search]
index_format = "elasticlunr_json"

[markdown]
[markdown.highlighting]
theme = "catppuccin-mocha"


# ==========================================
# 2. Extra Settings (All theme variables live here)
# ==========================================
[extra]
enable_theme_switching = true

# These theme variables were moved here to fix your exact crash!
daisyui_theme_light = "light"
daisyui_theme_dark = "dark"
highlight_code = true
highlight_theme = "css"

[extra.index]
slogan = "Mechanical Engineering Portfolio"
image = "portrait.png"
image_alt = "Nicholas Cerone Portrait"

[extra.navbar]
links = [
    { url = "projects", i18n_key = "projects" },
    { url = "skills", i18n_key = "skills" }
]

[extra.social]
github = "https://github.com/n-cerone"
linkedin = ""
email = "your-email@gmail.com"

[extra.footer]
notice = "© 2026 Nicholas Cerone. All rights reserved."